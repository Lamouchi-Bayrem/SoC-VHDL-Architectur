name: GHDL Simulation

on:
  push:
  pull_request:

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GHDL
        run: |
          sudo apt-get update
          sudo apt-get install -y ghdl

      - name: Run simulations
        run: |
          chmod +x scripts/run_all.sh
          ./scripts/run_all.sh
